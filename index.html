<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Nuestro Gran Viaje! ✈️🥳</title>
    <!-- Cargamos fuentes bonitas y divertidas desde Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* ESTILOS Y DISEÑO VISUAL (CSS) */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            /* DEGRADADO DE FONDO (Se mostrará mientras se carga tu dibujo, o si decides no usarlo) */
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            
            /* CÓMO INCORPORAR TU DIBUJO:
               Para usar tu propio dibujo de fondo, debes subirlo a tu carpeta de GitHub con el nombre "dibujo.jpg" 
               y borrar las dos barras "//" de la siguiente línea de código: */
            /* background-image: url('dibujo.jpg'); */
            
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
            overflow-x: hidden;
        }

        /* Tarjeta contenedora con efecto cristal translúcido (Glassmorphism) */
        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 3px solid #ff758f;
            border-radius: 30px;
            padding: 35px 25px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 15px 35px rgba(255, 75, 110, 0.2);
        }

        h1 {
            font-family: 'Fredoka', sans-serif;
            color: #ff477e;
            font-size: 2.2rem;
            margin-bottom: 10px;
            line-height: 1.2;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #6c757d;
            margin-bottom: 25px;
            font-weight: bold;
        }

        /* DISEÑO DE LOS NÚMEROS DEL CONTADOR */
        .countdown-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 30px;
        }

        .time-box {
            background: #ffeaec;
            border: 2px solid #ffb3c1;
            border-radius: 18px;
            padding: 12px 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .number {
            font-family: 'Fredoka', sans-serif;
            font-size: 2.2rem;
            color: #ff0a54;
        }

        .label {
            font-size: 0.8rem;
            font-weight: 700;
            color: #ff758f;
            text-transform: uppercase;
            margin-top: 4px;
        }

        /* SECCIÓN DE LAS VIAJERAS (Tus amigas) */
        .friends-section {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 15px;
            border: 1px dashed #ff758f;
        }

        .friends-title {
            font-family: 'Fredoka', sans-serif;
            color: #ff477e;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .friends-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }

        /* Etiquetas individuales para los nombres */
        .friend-badge {
            background: #ffe5ec;
            color: #ff0a54;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        /* Mensaje de carga o finalización */
        #finished-message {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.8rem;
            color: #ff0a54;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>¡Nos vamos de viaje! ✈️🥳</h1>
        <p class="subtitle">Destino definitivo el 12 de Junio de 2026</p>
        
        <!-- Bloque del contador -->
        <div class="countdown-container" id="timer">
            <div class="time-box">
                <span class="number" id="days">00</span>
                <span class="label">Días</span>
            </div>
            <div class="time-box">
                <span class="number" id="hours">00</span>
                <span class="label">Horas</span>
            </div>
            <div class="time-box">
                <span class="number" id="minutes">00</span>
                <span class="label">Mins</span>
            </div>
            <div class="time-box">
                <span class="number" id="seconds">00</span>
                <span class="label">Segs</span>
            </div>
        </div>

        <!-- Sección de nombres personalizable -->
        <div class="friends-section">
            <h3 class="friends-title">Tripulación confirmada:</h3>
            <div class="friends-list">
                <!-- Puedes cambiar estos nombres por los de tus amigas directamente en el código -->
                <span class="friend-badge">🙋‍♀️ Cris</span>
                <span class="friend-badge">🙋‍♀️ María</span>
                <span class="friend-badge">🙋‍♀️ Laura</span>
                <span class="friend-badge">🙋‍♀️ Ana</span>
            </div>
        </div>
    </div>

    <script>
        // LÓGICA DE PROGRAMACIÓN (JAVASCRIPT)
        
        // Fecha de salida: 12 de Junio de 2026 a las 06:30 AM
        // (Nota técnica: El mes 5 representa Junio debido al índice base 0 de JS)
        const travelDate = new Date(2026, 5, 12, 6, 30, 0).getTime();

        const updateTimer = setInterval(function() {
            const now = new Date().getTime();
            const difference = travelDate - now;

            // Cálculos matemáticos de conversión temporal
            const d = Math.floor(difference / (1000 * 60 * 60 * 24));
            const h = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((difference % (1000 * 60)) / 1000);

            // Inyección de variables en el HTML
            document.getElementById("days").innerText = d < 10 ? "0" + d : d;
            document.getElementById("hours").innerText = h < 10 ? "0" + h : h;
            document.getElementById("minutes").innerText = m < 10 ? "0" + m : m;
            document.getElementById("seconds").innerText = s < 10 ? "0" + s : s;

            // Si llegamos a la fecha del vuelo, detenemos el script
            if (difference < 0) {
                clearInterval(updateTimer);
                document.getElementById("timer").innerHTML = "<div id='finished-message'>¡A VOLAR! 🛫🌍✨</div>";
            }
        }, 1000);
    </script>

</body>
</html>
