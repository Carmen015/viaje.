<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuenta Atrás para el Viaje ✈️</title>
    <style>
        /* DISEÑO GENERAL */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #74b9ff, #0984e3);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        /* CONTENEDOR DEL CONTADOR */
        #countdown {
            display: flex;
            gap: 15px;
            background: rgba(255, 255, 255, 0.2);
            padding: 20px 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(5px);
        }

        /* Bloques individuales para cada unidad de tiempo */
        .time-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 70px;
        }

        .number {
            font-size: 3rem;
            font-weight: bold;
        }

        .label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
            opacity: 0.9;
        }

        /* Mensaje cuando el tiempo expira */
        #loading-message {
            font-size: 1.5rem;
        }
    </style>
</head>
<body>

    <h1>¡Nos vamos de viaje! ✈️🌍</h1>
    
    <div id="countdown">
        <div class="time-box">
            <span class="number" id="days">00</span>
            <span class="label">Días</span>
        </div>
        <div class="time-box">
            <span class="number" id="hours">00</span>
            <span class="label">Horas</span>
        </div>
        <div class="time-box">
            <span class="number" id="minutes">00</span>
            <span class="label">Min.</span>
        </div>
        <div class="time-box">
            <span class="number" id="seconds">00</span>
            <span class="label">Seg.</span>
        </div>
    </div>

    <script>
        // LÓGICA DEL CONTADOR (JAVASCRIPT)

        // 1. Definimos la fecha objetivo (Año, Mes [0-11], Día, Hora, Minuto)
        // Nota: En JavaScript los meses empiezan en 0 (Enero = 0, Junio = 5)
        const targetDate = new Date(2026, 5, 12, 6, 30, 0).getTime();

        // 2. Actualizamos el contador cada 1 segundo (1000 milisegundos)
        const interval = setInterval(function() {

            // Obtener la fecha y hora actual
            const now = new Date().getTime();

            // Calcular la distancia/diferencia entre ambas fechas
            const distance = targetDate - now;

            // Cálculos matemáticos para convertir milisegundos a Días, Horas, Minutos y Segundos
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // 3. Inyectamos los resultados directamente en el HTML utilizando el ID de cada elemento
            document.getElementById("days").innerText = days < 10 ? "0" + days : days;
            document.getElementById("hours").innerText = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerText = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerText = seconds < 10 ? "0" + seconds : seconds;

            // 4. Si la cuenta atrás ha terminado, detenemos el contador y mostramos un mensaje
            if (distance < 0) {
                clearInterval(interval);
                document.getElementById("countdown").innerHTML = "<div id='loading-message'>¡Buen viaje! 🛫</div>";
            }

        }, 1000);
    </script>

</body>
</html>
